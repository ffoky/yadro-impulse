version: "2"

issues:
  max-same-issues: 20

formatters:
  enable:
    - goimports

linters:
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - cyclop
    - dupl
    - errcheck
    - errname
    - errorlint
    - funcorder
    - funlen
    - gocognit
    - goconst
    - gocritic
    - goprintffuncname
    - govet
    - ineffassign
    - intrange
    - loggercheck
    - mnd
    - musttag
    - nestif
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - reassign
    - recvcheck
    - revive
    - staticcheck
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - wrapcheck
    - decorder

  settings:
    cyclop:
      max-complexity: 30

    errcheck:
      check-type-assertions: true

    funlen:
      lines: 90

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    nolintlint:
      allow-no-explanation: [ funlen, gocognit ]
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    staticcheck:
      checks:
        - all
        - -ST1000
        - -QF1008

  exclusions:
    rules:
      - text: 'should have a package comment'
        linters: [ revive ]
      - text: 'exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported'
        linters: [ revive ]
      - text: 'package comment should be of the form ".+"'
        source: '// ?(nolint|TODO)'
        linters: [ revive ]
      - text: 'comment on exported \S+ \S+ should be of the form ".+"'
        source: '// ?(nolint|TODO)'
        linters: [ revive, staticcheck ]
      - path: 'repository/postgres/sql/'
        text: 'var-naming: avoid package names'
        linters: [ revive ]
      - path: '_test\.go'
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - mnd
          - noctx
          - wrapcheck